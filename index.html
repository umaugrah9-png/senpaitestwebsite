<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senpai Studios // TOOLKIT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0c12;
            font-family: monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Auth Panel */
        .auth-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #05070c;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .auth-card {
            background: #0f111a;
            border: 1px solid #ff3366;
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            max-width: 400px;
        }
        .auth-card h1 { color: #ff6680; margin-bottom: 1rem; }
        .auth-card p { color: #888; margin-bottom: 1.5rem; }
        .auth-btn {
            background: #ff3366;
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }
        .auth-btn:hover { background: #ff5577; }
        
        /* Loading Screen */
        .loading-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #05070c;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            display: none;
        }
        .loading-card {
            background: #0f111a;
            border: 1px solid #ff6680;
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            max-width: 450px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #2a2a3a;
            border-top: 3px solid #ff3366;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text { color: #ff99aa; margin-bottom: 1rem; font-size: 1.1rem; }
        .log-area {
            background: #010103;
            padding: 1rem;
            border-radius: 12px;
            text-align: left;
            font-size: 0.7rem;
            color: #7effb3;
            height: 200px;
            overflow-y: auto;
            margin-top: 1rem;
        }
        .log-line { margin: 4px 0; border-left: 2px solid #ff6680; padding-left: 8px; }
        
        /* Dashboard */
        .dashboard {
            max-width: 1200px;
            margin: 2rem;
            display: none;
        }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { color: #ff6680; margin-bottom: 0.5rem; }
        .badge { background: #1f1b2e; display: inline-block; padding: 4px 16px; border-radius: 40px; color: #ffaa88; margin-top: 10px; }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        .tool-card {
            background: #0f111a;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            padding: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .tool-card:hover { border-color: #ff6680; transform: translateY(-2px); }
        .tool-name { color: #ff99aa; font-size: 1.2rem; font-weight: bold; }
        .tool-desc { color: #888; font-size: 0.75rem; margin: 8px 0; }
        .error-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a0a12;
            border-left: 4px solid #ff3366;
            padding: 12px 24px;
            border-radius: 40px;
            color: #ffaa99;
            display: none;
            z-index: 300;
        }
        .footer { text-align: center; margin-top: 2rem; color: #555; font-size: 0.7rem; }
    </style>
</head>
<body>

<!-- AUTH PANEL -->
<div id="authPanel" class="auth-panel">
    <div class="auth-card">
        <h1>✦ SENPAI STUDIOS ✦</h1>
        <p>private toolkit • restricted access</p>
        <button id="enterBtn" class="auth-btn">▶ ENTER TERMINAL</button>
    </div>
</div>

<!-- LOADING PANEL -->
<div id="loadingPanel" class="loading-panel">
    <div class="loading-card">
        <div class="spinner"></div>
        <div id="loadingText" class="loading-text">LOADING SECURE MODULE...</div>
        <div id="logArea" class="log-area"></div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
    <div class="header">
        <h1>⚡ SENPAI STUDIOS ⚡</h1>
        <div class="badge">◆ You Have Been Authenticated ◆</div>
        <div style="margin-top: 8px;">tool made by Senpai Studios — private build</div>
    </div>
    <div id="toolsGrid" class="tools-grid"></div>
    <div class="footer">[ private session ] • for authorized users only</div>
</div>

<div id="errorToast" class="error-toast">⚠️ NO PERMISSION • ONLY OWNER IP ADDRESS ALLOWED ⚠️</div>

<script>
    const tools = [
        { name: "FORCE OP", icon: "👑", desc: "Grant operator status to any player" },
        { name: "CRASH SERVER", icon: "💥", desc: "Force server shutdown" },
        { name: "STEAL SESSION", icon: "🎭", desc: "Extract player tokens" },
        { name: "FLY HACK INJECT", icon: "🕊️", desc: "Enable flight for all users" },
        { name: "GIVE COMMAND BLOCK", icon: "📦", desc: "Spawn admin command blocks" },
        { name: "BAN WAVE", icon: "🔨", desc: "Mass ban selected players" },
        { name: "DUPE ITEMS", icon: "🔄", desc: "Exploit duplication glitch" },
        { name: "XRAY VISION", icon: "👁️", desc: "Reveal ores through walls" },
        { name: "SPAWN WITHER ARMY", icon: "💀", desc: "Summon hostile mob army" },
        { name: "SERVER BACKDOOR", icon: "🚪", desc: "Install persistent remote access" }
    ];
    
    const authPanel = document.getElementById('authPanel');
    const loadingPanel = document.getElementById('loadingPanel');
    const dashboard = document.getElementById('dashboard');
    const enterBtn = document.getElementById('enterBtn');
    const logArea = document.getElementById('logArea');
    const loadingText = document.getElementById('loadingText');
    const errorToast = document.getElementById('errorToast');
    
    let toastTimer = null;
    
    function showError(toolName) {
        if (toastTimer) clearTimeout(toastTimer);
        errorToast.style.display = 'block';
        errorToast.innerHTML = `⛔ ACCESS DENIED | "${toolName}" requires owner privileges | ONLY OWNER IP ADDRESS ALLOWED ⛔`;
        toastTimer = setTimeout(() => {
            errorToast.style.display = 'none';
        }, 3500);
    }
    
    function renderTools() {
        const grid = document.getElementById('toolsGrid');
        grid.innerHTML = '';
        tools.forEach(tool => {
            const card = document.createElement('div');
            card.className = 'tool-card';
            card.innerHTML = `
                <div style="font-size: 2rem;">${tool.icon}</div>
                <div class="tool-name">${tool.name}</div>
                <div class="tool-desc">${tool.desc}</div>
                <div style="font-size: 0.6rem; color: #ff8866; margin-top: 8px;">🔒 owner-only</div>
            `;
            card.onclick = () => showError(tool.name);
            grid.appendChild(card);
        });
    }
    
    // Fake IP logs
    const fakeLogs = [
        ">_ handshake established • fingerprint: 192.168.47.21",
        ">_ retrieving geolocation • Tokyo, JP",
        ">_ ISP fingerprint: SenpaiNet",
        ">_ lol your ip has been logged • saving to database...",
        ">_ writing entry to remote_db",
        ">_ caching session cookies • encrypted",
        ">_ cache_cookies stored in memory",
        ">_ private web — your data archived",
        ">_ redirecting to toolkit..."
    ];
    
    function startLoading() {
        authPanel.style.display = 'none';
        loadingPanel.style.display = 'flex';
        
        let logIndex = 0;
        let textIndex = 0;
        
        const textMessages = [
            "LOADING SECURE MODULE...",
            "🔍 LOGGING IP & CACHE COOKIES...",
            "📡 SAVING TO DATABASE...",
            "⚠️ LOL YOUR IP HAS BEEN LOGGED ⚠️"
        ];
        
        function addLog() {
            if (logIndex < fakeLogs.length) {
                const logDiv = document.createElement('div');
                logDiv.className = 'log-line';
                logDiv.textContent = fakeLogs[logIndex];
                logArea.appendChild(logDiv);
                logArea.scrollTop = logArea.scrollHeight;
                logIndex++;
                
                const delay = (logIndex === fakeLogs.length) ? 600 : 300;
                setTimeout(addLog, delay);
            } else {
                setTimeout(() => {
                    loadingPanel.style.display = 'none';
                    dashboard.style.display = 'block';
                }, 500);
            }
        }
        
        // Change loading text every few seconds
        const textInterval = setInterval(() => {
            if (textIndex < textMessages.length - 1) {
                textIndex++;
                loadingText.textContent = textMessages[textIndex];
            }
        }, 2500);
        
        addLog();
        
        // Cleanup and show dashboard after 9 seconds total
        setTimeout(() => {
            clearInterval(textInterval);
            if (loadingPanel.style.display === 'flex') {
                loadingPanel.style.display = 'none';
                dashboard.style.display = 'block';
            }
        }, 9000);
    }
    
    enterBtn.onclick = startLoading;
    renderTools();
</script>
</body>
</html>
